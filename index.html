<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ソースコード Markdown変換ツール</title>

<style>
body {
    font-family: sans-serif;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    background-color: #f0f2f5;
}
.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}
h1 { margin-top: 0; color: #1a73e8; }
.actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 15px;
}
.btn {
    background: #1a73e8;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}
.btn.green { background: #34a853; }
.btn.gray { background: #666; }
textarea {
    width: 100%;
    height: 450px;
    font-family: monospace;
    font-size: 13px;
    padding: 12px;
    border-radius: 6px;
    background: #2d2d2d;
    color: #f8f8f2;
    line-height: 1.5;
}
.status-msg { font-size: 14px; color: #666; }

/* Modal */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
}
.modal-content {
    background: white;
    max-width: 620px;
    padding: 25px;
    border-radius: 12px;
    line-height: 1.7;
}
</style>
</head>

<body>

<div class="card">
    <h1>ソースコード Markdown変換ツール</h1>

    <div class="actions">
        <!-- ファイル複数選択 -->
        <input type="file" id="file-input" multiple style="display:none;">
        <button class="btn" onclick="fileInput.click()">📄 ファイルを選択</button>

        <!-- フォルダ複数選択 ( multiple 属性を追加 ) -->
        <input type="file" id="folder-input" webkitdirectory multiple style="display:none;">
        <button class="btn" onclick="folderInput.click()">📁 フォルダを選択</button>

        <button class="btn green" onclick="copyToClipboard()">結果をコピー</button>
        <button class="btn gray" onclick="openHelp()">使い方</button>
        <span id="status" class="status-msg"></span>
    </div>

    <textarea id="output" placeholder="ファイルまたはフォルダ（複数可）を選択するとMarkdownが出力されます…" spellcheck="false"></textarea>
</div>

<div class="modal" id="help-modal">
    <div class="modal-content">
        <h2>📘 使い方</h2>
        <ul>
            <li><b>ファイル選択</b>：選択したテキストファイルを Markdown 化（複数選択可）</li>
            <li><b>フォルダ選択</b>：フォルダ構成（全ファイル名）＋テキストファイルを Markdown 化（複数選択可）</li>
        </ul>
        <p>※ バイナリファイルは本文には出力されません（名前のみ表示）</p>
        <p><small>※ 複数フォルダの選択は、Chrome や Edge など対応しているブラウザでのみ動作します。</small></p>
        <button class="btn" onclick="closeHelp()">閉じる</button>
    </div>
</div>

<script>
const fileInput = document.getElementById('file-input');
const folderInput = document.getElementById('folder-input');
const output = document.getElementById('output');
const status = document.getElementById('status');
const modal = document.getElementById('help-modal');

const IGNORE_DIRS = ['.git', 'node_modules', '.svn', '.idea'];
const BINARY_EXTS = [
    'png','jpg','jpeg','gif','bmp','webp','ico',
    'pdf','zip','tar','gz','7z','rar',
    'exe','dll','so','dylib','mp3','mp4','mov','avi','wav'
];

function openHelp(){ modal.style.display='flex'; }
function closeHelp(){ modal.style.display='none'; }

const TEXT_EXTS = [
    // Programming
    'rs','swift','kt','java','go','c','h','cpp','hpp','cs',
    'js','ts','py','rb','php',

    // Web
    'html','css','scss',

    // Config / Data
    'json','yaml','yml','toml','xml',

    // Docs / Other
    'md','txt','sql','sh','ps1'
];

const SENSITIVE_FILES = [
    '.env',
    '.env.local',
    '.env.development',
    '.env.production',
    '.env.test'
];

function isTextFile(file) {
    const name = file.name.toLowerCase();
    const ext = name.includes('.') ? name.split('.').pop() : '';

    // 🔒 機密ファイルは無条件で除外
    if (SENSITIVE_FILES.includes(name)) return false;

    // 明確なバイナリは除外
    if (BINARY_EXTS.includes(ext)) return false;

    // 拡張子ベースでテキスト判定
    if (TEXT_EXTS.includes(ext)) return true;

    // MIMEタイプが text/* の場合も許可
    if (file.type && file.type.startsWith('text')) return true;

    return false;
}

function lang(name) {
    const ext = name.toLowerCase().split('.').pop();
    const map = {
        swift:'swift', kt:'kotlin', java:'java',
        rs:'rust', go:'go',
        c:'c', h:'c', cpp:'cpp', hpp:'cpp', cs:'csharp',
        js:'javascript', ts:'typescript',
        py:'python', rb:'ruby', php:'php',
        html:'html', css:'css', scss:'scss',
        json:'json',
        yaml:'yaml', yml:'yaml', toml:'toml',
        md:'markdown', sql:'sql',
        sh:'bash', ps1:'powershell',
        txt:'text'
    };
    return map[ext] || '';
}

function buildTree(files) {
    const root = {};
    files.forEach(f => {
        const parts = f.webkitRelativePath
            ? f.webkitRelativePath.split('/')
            : [f.name];

        parts.reduce((a,c)=>{
            a[c]=a[c]||{};
            return a[c];
        }, root);
    });

    function render(node, indent='') {
        return Object.keys(node).sort().map((k,i,a)=>{
            const last=i===a.length-1;
            return `${indent}${last?'└─':'├─'} ${k}\n${render(node[k], indent+(last?'   ':'│  '))}`;
        }).join('');
    }
    return render(root);
}

async function handleFiles(allFiles, showTree) {
    const textFiles = allFiles.filter(isTextFile);

    status.textContent = '処理中…';

    let result = '';

    if (showTree) {
        result +=
`## 📁 Folder Structure
\`\`\`text
${buildTree(allFiles)}
\`\`\`

`;
    }

    if (textFiles.length) {
        const contents = await Promise.all(textFiles.map(async f=>{
            const text = await f.text();
            const name = f.webkitRelativePath || f.name;
            return `### File: ${name}\n\`\`\`${lang(f.name)}\n${text}\n\`\`\``;
        }));
        result += `## 📄 Files\n${contents.join('\n\n')}`;
    } else {
        result += '_Markdown 化できるテキストファイルはありません_';
    }

    output.value = result;
    status.textContent = '完了！';
}

fileInput.addEventListener('change', e =>
    handleFiles([...e.target.files], false)
);
folderInput.addEventListener('change', e =>
    handleFiles([...e.target.files], true)
);

async function copyToClipboard() {
    if (!output.value) return;
    await navigator.clipboard.writeText(output.value);
    status.textContent = 'コピーしました！';
    setTimeout(()=>status.textContent='',2000);
}
</script>

</body>
</html>
